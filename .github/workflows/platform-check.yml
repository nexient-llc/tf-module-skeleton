name: pipeline-check
on: [push, workflow_call]
jobs:
  check:
    runs-on: nexient-llc/platform-images
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - uses: ./.github/actions/configure
        with:
          JOB_NAME: "job"
          JOB_EMAIL: "job@job.job"
      - uses: ./.github/actions/check
